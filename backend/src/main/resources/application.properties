spring.application.name=comunigest-backend
spring.profiles.default=local
server.port=8080

spring.datasource.url=jdbc:h2:file:./data/comunigest-local;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

comunigest.cors.allowed-origins=http://localhost:4200

# Valor solo para demostracion local. En produccion definir COMUNIGEST_JWT_SECRET.
comunigest.jwt.secret=${COMUNIGEST_JWT_SECRET:ComuniGest-demo-local-secret-change-in-production-2026-very-long}
comunigest.jwt.issuer=ComuniGest
comunigest.jwt.expiration-hours=8
