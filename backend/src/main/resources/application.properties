spring.application.name=comunigest-backend
spring.profiles.default=mysql
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
server.port=8080

spring.jpa.properties.hibernate.format_sql=true

comunigest.cors.allowed-origins=http://localhost:4200

comunigest.jwt.issuer=ComuniGest
comunigest.jwt.expiration-hours=8

spring.mail.host=${COMUNIGEST_MAIL_HOST:localhost}
spring.mail.port=${COMUNIGEST_MAIL_PORT:1025}
spring.mail.username=${COMUNIGEST_MAIL_USERNAME:}
spring.mail.password=${COMUNIGEST_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.test-connection=false

comunigest.mail.provider=${COMUNIGEST_MAIL_PROVIDER:smtp}
comunigest.mail.from=${COMUNIGEST_MAIL_FROM:no-reply@comunigest.local}
comunigest.frontend.url=${COMUNIGEST_FRONTEND_URL:http://localhost:4200}

# Evita que RestClient registre el HTML con el token de recuperacion al habilitar DEBUG global.
logging.level.org.springframework.web.client.DefaultRestClient=INFO
