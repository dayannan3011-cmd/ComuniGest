spring.datasource.url=${COMUNIGEST_DB_URL:jdbc:mysql://localhost:3306/comunigest_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago}
spring.datasource.username=${COMUNIGEST_DB_USERNAME:root}
spring.datasource.password=${COMUNIGEST_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.h2.console.enabled=false

comunigest.jwt.secret=${COMUNIGEST_JWT_SECRET}
